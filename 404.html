<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Zyrvath Studio</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #050610;
  --surface: #09101e;
  --border:  #16213a;
  --accent:  #ff7800;
  --accent2: #f59e0b;
  --glow:    rgba(255,120,0,0.75);
  --glow2:   rgba(255,120,0,0.3);
  --text:    #e8f1f5;
  --muted:   #8fa3bb;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg); color: var(--text);
  line-height: 1.65; min-height: 100vh;
  display: flex; flex-direction: column; overflow-x: hidden;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: #ffad52; text-decoration: none; }

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(5,6,16,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 1.25rem; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  display: flex; align-items: center; flex-shrink: 0;
  text-decoration: none;
}
.nav-logo img {
  height: 34px; width: auto;
  filter: drop-shadow(0 0 8px var(--glow)) drop-shadow(0 0 20px var(--glow2));
  transition: filter 0.2s;
}
.nav-logo:hover img {
  filter: drop-shadow(0 0 12px var(--glow)) drop-shadow(0 0 30px rgba(255,120,0,0.5));
}
.nav-toggle {
  display: flex; flex-direction: column; justify-content: center; gap: 5px;
  background: none; border: none; cursor: pointer;
  padding: 8px; margin: -8px -4px -8px 0;
}
.nav-toggle span {
  display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px;
  transition: transform 0.22s ease, opacity 0.18s ease; transform-origin: center;
}
nav.open .nav-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
nav.open .nav-toggle span:nth-child(2) { opacity: 0; transform: scaleX(0); }
nav.open .nav-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.nav-links {
  display: none; list-style: none;
  position: absolute; top: 60px; left: 0; right: 0;
  background: rgba(5,6,16,0.97); border-bottom: 1px solid var(--border);
  flex-direction: column; padding: 0.4rem 0;
}
nav.open .nav-links { display: flex; }
.nav-links a {
  display: block; color: var(--muted);
  font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 0.75rem 1.5rem; transition: color 0.15s, background 0.15s;
}
.nav-links a:hover { color: var(--accent); background: rgba(255,120,0,0.05); }
.nav-links a.active { color: var(--accent); }
@media (min-width: 640px) {
  nav { padding: 0 2rem; height: 68px; }
  .nav-logo img { height: 40px; }
  .nav-toggle { display: none; }
  .nav-links {
    display: flex !important; flex-direction: row; position: static;
    background: none; border: none; padding: 0; gap: 0;
  }
  .nav-links a { padding: 0.4rem 0.85rem; border-radius: 5px; font-size: 0.82rem; }
  .nav-links a:hover { background: rgba(255,120,0,0.07); }
}

/* ── LAYOUT ── */
main { flex: 1; width: 100%; max-width: 820px; margin: 0 auto; padding: 2.5rem 1.25rem 3.5rem; }

/* ── TYPE ── */
.badge {
  display: inline-block; font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent); background: rgba(255,120,0,0.09);
  border: 1px solid rgba(255,120,0,0.28); border-radius: 2px;
  padding: 0.28rem 0.8rem; margin-bottom: 1rem;
  font-family: 'Orbitron', monospace;
}
h1 {
  font-family: 'Orbitron', monospace; font-weight: 900;
  font-size: 1.65rem; line-height: 1.15; color: #fff; margin-bottom: 1rem;
}
h2 {
  font-family: 'Orbitron', monospace; font-weight: 700;
  font-size: 0.95rem; letter-spacing: 0.07em; color: #fff;
  margin: 2.25rem 0 0.6rem; text-transform: uppercase;
}
h3 {
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 0.95rem; color: var(--text); margin: 1.1rem 0 0.35rem;
}
p { color: var(--muted); margin-bottom: 0.85rem; font-size: 1.05rem; }
p:last-child { margin-bottom: 0; }
.lead { font-size: 1.1rem; color: var(--text); margin-bottom: 1.25rem; }
ul, ol { color: var(--muted); padding-left: 1.35rem; margin-bottom: 0.85rem; font-size: 1.05rem; }
li { margin-bottom: 0.3rem; }
hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.updated { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; font-family:'Orbitron',monospace; letter-spacing:0.05em; }

/* ── CARD ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 2px solid rgba(255,120,0,0.3);
  border-radius: 4px; padding: 1.35rem; margin-bottom: 1rem;
}
.card h2 { margin-top: 0; }

/* ── FOOTER ── */
footer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 1.75rem 1.25rem 2rem;
}
.footer-inner { max-width: 820px; margin: 0 auto; }
.footer-logo {
  display: flex; justify-content: center; margin-bottom: 1.25rem;
}
.footer-logo img {
  height: 36px; width: auto; opacity: 0.7;
  filter: drop-shadow(0 0 6px var(--glow2));
}
.footer-links {
  display: flex; flex-wrap: wrap; gap: 0.85rem;
  justify-content: center; margin-bottom: 1rem;
}
.footer-links a {
  color: var(--muted); font-size: 0.78rem; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.footer-links a:hover { color: var(--accent); }
.footer-copy { color: var(--muted); font-size: 0.72rem; text-align: center; letter-spacing: 0.04em; }
.footer-divider { border: none; border-top: 1px solid var(--border); margin-bottom: 1.25rem; }

@media (min-width: 640px) {
  main { padding: 4rem 2rem 5rem; }
  h1 { font-size: clamp(1.9rem, 3.5vw, 2.8rem); }
  h2 { font-size: 1.05rem; }
  .card { padding: 1.75rem; margin-bottom: 1.25rem; }
  footer { padding: 2.25rem 2rem 2.5rem; }
}
@media (min-width: 1024px) { .card { padding: 2rem; margin-bottom: 1.5rem; } }

main {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:3rem 1.5rem;
  position:relative; overflow:hidden;
}
main::before {
  content:'404';
  position:absolute; font-family:'Orbitron',monospace; font-weight:900;
  font-size:clamp(10rem, 35vw, 22rem); line-height:1; color:rgba(255,120,0,0.04);
  pointer-events:none; user-select:none; z-index:0;
  top:50%; left:50%; transform:translate(-50%,-50%);
}
.err-content { position:relative; z-index:1; }
.err-num {
  font-family:'Orbitron',monospace; font-weight:900;
  font-size:clamp(3.5rem, 12vw, 7rem); line-height:1; margin-bottom:0.5rem;
  background:linear-gradient(135deg,#ff7800,#f59e0b);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 30px rgba(255,120,0,0.5));
}
.err-logo { width:64px; height:auto; margin:0 auto 1.5rem; opacity:0.7; filter:drop-shadow(0 0 8px rgba(255,120,0,0.4)); }
.btn-home {
  display:inline-flex; align-items:center; gap:0.5rem;
  background:linear-gradient(135deg,#ff7800,#f59e0b);
  color:#050610; font-family:'Orbitron',monospace; font-weight:900;
  font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase;
  padding:0.9rem 1.8rem; border-radius:3px;
  box-shadow:0 0 20px rgba(255,120,0,0.35); text-decoration:none;
  transition:box-shadow 0.2s, transform 0.15s;
}
.btn-home:hover { box-shadow:0 0 32px rgba(255,120,0,0.55); transform:translateY(-1px); color:#050610; }
  </style>
</head>
<body>
<nav id="site-nav">
  <a class="nav-logo" href="/" aria-label="Zyrvath Home">
    <img src="/logo.png" alt="Zyrvath">
  </a>
  <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" onclick="toggleNav(this)">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links">
    <li><a href="/games.html">Games</a></li>
    <li><a href="/how-to-play.html">How to Play</a></li>
    <li><a href="/about.html">About</a></li>
    <li><a href="/contact.html">Contact</a></li>
  </ul>
</nav>
<main>
  <div class="err-content">
    <img class="err-logo" src="/logo.png" alt="Zyrvath">
    <div class="err-num">404</div>
    <span class="badge">Off the map</span>
    <h1 style="font-size:1.3rem;margin:0.75rem 0 0.6rem;">Nothing here.</h1>
    <p style="max-width:320px;margin:0 auto 2rem;font-size:1rem;">Whatever you were looking for has either moved or never existed. Easy to fix.</p>
    <a class="btn-home" href="/">Go Home</a>
  </div>
</main>
<footer>
  <div class="footer-inner">
    <div class="footer-logo">
      <a href="/"><img src="/logo.png" alt="Zyrvath"></a>
    </div>
    <hr class="footer-divider">
    <div class="footer-links">
      <a href="/about.html">About</a>
      <a href="/games.html">Games</a>
      <a href="/how-to-play.html">How to Play</a>
      <a href="/contact.html">Contact</a>
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
      <a href="/cookies.html">Cookies</a>
    </div>
    <p class="footer-copy">&copy; 2025 Zyrvath Studio. All rights reserved.</p>
  </div>
</footer>
<script>
function toggleNav(btn) {
  const nav = btn.closest('nav');
  const open = nav.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
  btn.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
}
document.addEventListener('click', e => {
  if (!e.target.closest('nav')) {
    const nav = document.getElementById('site-nav');
    if (nav) { nav.classList.remove('open'); const b=nav.querySelector('.nav-toggle'); if(b) b.setAttribute('aria-expanded',false); }
  }
});
document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', () => {
  const nav = document.getElementById('site-nav');
  if (nav) nav.classList.remove('open');
}));
</script>
</body>
</html>
