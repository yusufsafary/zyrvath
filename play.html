<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Play Demo — Zyrvath</title>
  <meta name="description" content="Play the Zyrvath space combat demo. Free. No account required.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="/assets/index-C0OD_kvZ.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#07070f;--surface:#0d0d1c;--border:#1a1a2e;
      --accent:#ff7800;--accent-dim:rgba(255,120,0,.12);
      --text:#dde6f0;--muted:#8892a4;
    }
    html,body{height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif}
    #demo-bar{
      position:fixed;top:0;left:0;right:0;z-index:9999;height:44px;
      background:rgba(7,7,15,.97);border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 1.25rem;gap:1rem;
    }
    #demo-bar::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent 0%,rgba(255,120,0,.4) 50%,transparent 100%);
    }
    #demo-bar a{
      display:inline-flex;align-items:center;gap:.4rem;
      color:var(--muted);font-size:.78rem;font-weight:600;
      text-decoration:none;transition:color .15s;font-family:'Rajdhani',sans-serif;
      letter-spacing:.04em;
    }
    #demo-bar a:hover{color:#fff}
    #demo-bar a svg{width:14px;height:14px;flex-shrink:0}
    .demo-wordmark{
      font-family:'Orbitron',monospace;font-weight:900;font-size:.72rem;
      letter-spacing:.18em;color:rgba(255,255,255,.35);
    }
    .demo-badge{
      font-family:'Orbitron',monospace;font-size:.58rem;font-weight:900;
      letter-spacing:.12em;text-transform:uppercase;color:var(--accent);
      background:var(--accent-dim);border:1px solid rgba(255,120,0,.3);
      border-radius:2px;padding:.18rem .65rem;
    }
    #root{padding-top:44px;min-height:100vh}
    #demo-loading{
      position:fixed;inset:44px 0 0 0;z-index:100;
      background:var(--bg);display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:1.25rem;
    }
    .spin{
      width:32px;height:32px;border-radius:50%;
      border:2px solid rgba(255,120,0,.15);border-top-color:var(--accent);
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    #demo-loading p{color:var(--muted);font-size:.82rem;font-family:'Orbitron',monospace;letter-spacing:.1em}
  </style>
</head>
<body>
<div id="demo-bar">
  <a href="/games.html">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
    Back to Site
  </a>
  <span class="demo-wordmark">ZYRVATH</span>
  <span class="demo-badge">Demo</span>
</div>

<div id="demo-loading">
  <div class="spin"></div>
  <p>Initializing...</p>
</div>

<div id="root"></div>

<script>
  if(window.location.pathname!=='/'){
    window.history.replaceState({demoOrigin:window.location.pathname},'','/');
  }
  var observer=new MutationObserver(function(){
    var root=document.getElementById('root');
    if(root&&root.children.length>0){
      var loading=document.getElementById('demo-loading');
      if(loading)loading.style.display='none';
      observer.disconnect();
    }
  });
  observer.observe(document.getElementById('root'),{childList:true});
  setTimeout(function(){
    var loading=document.getElementById('demo-loading');
    if(loading)loading.style.display='none';
  },8000);
</script>
<script type="module" crossorigin src="/assets/index-DwIO24jd.js"></script>
</body>
</html>
